<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 Game Example</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }
        #gameArea {
            position: relative;
            width: 800px;
            height: 600px;
            background-color: #2c3e50;
            border: 4px solid #34495e;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        #target {
            position: absolute;
            width: 60px;
            height: 60px;
            background-color: #e74c3c;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease-out;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 24px;
        }
        #target:active {
            transform: scale(0.9);
            background-color: #c0392b;
        }
        #scoreBoard {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 28px;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .instruction {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #bdc3c7;
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="gameArea">
        <div id="scoreBoard">Очки: <span id="score">0</span></div>
        <div id="target" style="left: 370px; top: 270px;">🎯</div>
        <div class="instruction">
            Кликай по мишени! | Ctrl+Alt+Enter для переключения полноэкранного режима
        </div>
    </div>

    <script>
        const target = document.getElementById('target');
        const scoreElement = document.getElementById('score');
        const gameArea = document.getElementById('gameArea');
        let score = 0;

        function moveTarget() {
            const maxX = gameArea.clientWidth - target.clientWidth;
            const maxY = gameArea.clientHeight - target.clientHeight;
            
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);
            
            target.style.left = randomX + 'px';
            target.style.top = randomY + 'px';
        }

        target.addEventListener('click', (e) => {
            e.stopPropagation();
            score++;
            scoreElement.textContent = score;
            
            // Пример вызова функции Go из JavaScript!
            if (window.api && window.api.Ping) {
                window.api.Ping("Игрок заработал очко: " + score).then(res => {
                    console.log("Ответ от движка Go:", res);
                }).catch(err => console.error(err));
            }

            moveTarget();
        });

        // Усложняем игру: мишень сама прыгает каждые 1.2 секунды
        setInterval(moveTarget, 1200);
    </script>
</body>
</html>
