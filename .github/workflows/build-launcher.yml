name: Build Launchers

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: windows
            runner: windows-latest
            ext: .exe
            deps: ""
          - os: linux
            runner: ubuntu-latest
            ext: ""
            deps: "sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.0-dev"
          - os: macos
            runner: macos-latest
            ext: ""
            deps: ""

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        
    - name: Install Dependencies
      if: matrix.deps != ''
      run: ${{ matrix.deps }}

    - name: Build HTML5Launcher
      run: |
        go build -v -o HTML5Launcher_${{ matrix.os }}${{ matrix.ext }} ./cmd/launcher
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HTML5Launcher-${{ matrix.os }}
        path: HTML5Launcher_${{ matrix.os }}${{ matrix.ext }}
